[tasks.lint-fix]
description = "Run clippy with automatic fixes on the whole project"
command = "cargo"
args = [
    "clippy",
    "--all-targets",
    "--all-features",
    "--fix",
    "--allow-dirty",
    "--",
    "-D",
    "warnings",
]

[tasks.setup]
description = "Setup development environment"
dependencies = ["add-targets"]

[tasks.dev]
description = "Run the application with RUST_LOG=info"
command = "cargo"
args = ["run"]
env = { RUST_LOG = "info" }
