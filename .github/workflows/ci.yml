name: CI

on:
  push:
  workflow_dispatch:

jobs:
  linux-tests:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM 14
        id: llvm
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "14.0"

      - name: Set LLVM env vars
        shell: bash
        run: |
          echo "LLVM_SYS_140_PREFIX=${{ steps.llvm.outputs.llvm-path }}" >> "$GITHUB_ENV"

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --all-features

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check formatting
        run: cargo fmt --all -- --check

  windows-build:
    runs-on: windows-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM 14
        id: llvm
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "14.0"

      - name: Set LLVM env vars
        shell: bash
        run: |
          echo "LLVM_SYS_140_PREFIX=${{ steps.llvm.outputs.llvm-path }}" >> "$GITHUB_ENV"

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Run lib tests
        run: cargo test --lib

      - name: Run hello-world on Windows
        shell: pwsh
        run: |
          $output = & .\target\release\opalescent.exe run test-projects\hello-world\src\main.op 2>&1
          Write-Host "Output: $output"
          if ($output -notmatch "Hello world") {
            Write-Error "Expected 'Hello world', got: $output"
            exit 1
          }

      - name: Upload opalescent.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: opalescent-windows
          path: target/release/opalescent.exe
          if-no-files-found: error

  cross-msvc-from-linux:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      XWIN_CACHE: $HOME/.xwin
      CC_x86_64_pc_windows_msvc: clang-cl
      CFLAGS_x86_64_pc_windows_msvc: /imsvc $HOME/.xwin/crt/include /imsvc $HOME/.xwin/sdk/include/ucrt /imsvc $HOME/.xwin/sdk/include/um /imsvc $HOME/.xwin/sdk/include/shared
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM 14
        id: llvm
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "14.0"

      - name: Set LLVM env vars
        shell: bash
        run: |
          echo "LLVM_SYS_140_PREFIX=${{ steps.llvm.outputs.llvm-path }}" >> "$GITHUB_ENV"

      - name: Cache xwin sysroot
        uses: actions/cache@v4
        with:
          path: ${{ env.XWIN_CACHE }}
          key: xwin-${{ hashFiles('**/Cargo.lock') }}

      - name: Install xwin
        shell: bash
        run: |
          cargo install xwin --version 0.9.0 --locked
          xwin --accept-license splat --output ${{ env.XWIN_CACHE }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Cross-compile to x86_64-pc-windows-msvc
        run: cargo run --release -- test-projects/hello-world/src/main.op --target x86_64-pc-windows-msvc

      - name: Install Wine
        run: |
          sudo apt-get update
          sudo apt-get install -y wine64

      - name: Execute cross-compiled .exe with Wine
        env:
          WINEDEBUG: -all
          WINEPREFIX: /tmp/wine-opal
        run: |
          EXE_PATH="target/program.exe"
          OUTPUT=$(wine "$EXE_PATH" 2>/dev/null)
          echo "Wine execution output: $OUTPUT"
          if [ "$OUTPUT" = "Hello world" ]; then
            echo "Wine execution successful: output matches expected 'Hello world'"
          else
            echo "Wine execution failed: expected 'Hello world', got '$OUTPUT'"
            exit 1
          fi

      - name: Upload cross-compiled exe
        uses: actions/upload-artifact@v4
        with:
          name: opalescent-windows-cross
          path: target/program.exe
          if-no-files-found: error
